# 測試環境清單（qa-v2 / ops-v2 必要產物）
# 提供 qa-v2 / pm-v2 判斷各環境的測試端點、安全規則、測試帳號

# ── 全域（不隨環境變）────────────────────────────────────────────
project: taan-basketball-league
services: [web]                          # 純前端 Astro，無 multi-portal
tools:
  e2e: playwright
  e2e_mcp: playwright-mcp
  integration: vitest
  unit: vitest

# ── 各環境 ──────────────────────────────────────────────────────
# 注意：本專案無 uat 環境（CLAUDE.md 註明），prod 為唯一部署目標。
# qa-v2 Phase 6 找不到 uat 條目時應回傳 BLOCKED，不可逕用 prod 替代。
environments:
  local:
    urls:
      web: http://localhost:4321
    can_destroy_data: true
    requires_real_money: false
    test_accounts: null                  # 純展示型網站，無使用者帳號
    notes: "啟動：npm run dev（Astro Vite HMR，預設 port 4321）"

  prod:
    urls:
      web: https://waterfat.github.io/taan-basketball-league/
    can_destroy_data: false              # 資料源為 prod Google Sheets，不可由測試寫入
    requires_real_money: false
    forbidden_tests:
      - "資料寫入 / 修改（Google Sheets 由賽務同仁人工維護）"
    test_accounts: null
    notes: "GitHub Pages（push main → Actions build → gh-pages 部署），base URL 含 repo 子路徑"

# ── 第三方依賴端點 ──────────────────────────────────────────────
external:
  google_sheets_api:
    url: https://sheets.googleapis.com/v4/spreadsheets/{SHEET_ID}/values:batchGet
    description: Google Sheets API v4（球員 / 賽程 / 戰績 / 龍虎榜資料源，瀏覽器直打）
    fallback: public/data/*.json
    notes: 認證走 ?key= API key（HTTP referrer 限制 + 限定 Sheets API v4）；瀏覽器內 5 分鐘 cache

# ── 環境變數清單 ──────────────────────────────────────────────────
env_vars:
  PUBLIC_SHEET_ID:
    purpose: Google Sheets spreadsheet ID（直接打 Sheets API v4 用）
    used_by: [src/lib/api.ts, src/lib/boxscore-api.ts]
    sources:
      acc_pw_section: taan-basketball-league
      ci: gh variable (vars)
    inject_at:
      dev: .env.local
      test: vi.stubEnv('PUBLIC_SHEET_ID', 'TEST_SHEET_ID') 於 integration test beforeEach
      build: .github/workflows/*.yml build job env
    required_for: [dev, test, build, deploy]

  PUBLIC_SHEETS_API_KEY:
    purpose: Google Sheets API key（v4 values.get / values:batchGet 認證）
    used_by: [src/lib/api.ts, src/lib/boxscore-api.ts]
    sources:
      acc_pw_section: taan-basketball-league
      ci: gh secret
    inject_at:
      dev: .env.local
      test: vi.stubEnv('PUBLIC_SHEETS_API_KEY', 'TEST_API_KEY') 於 integration test beforeEach
      build: .github/workflows/*.yml build job env
    required_for: [dev, test, build, deploy]
