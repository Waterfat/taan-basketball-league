name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PUBLIC_SITE_URL: https://waterfat.github.io/taan-basketball-league

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SHEET_ID: ${{ vars.PUBLIC_SHEET_ID }}
      PUBLIC_SHEETS_API_KEY: ${{ vars.PUBLIC_SHEETS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (astro check)
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E regression
        run: npm run test:e2e:regression

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
